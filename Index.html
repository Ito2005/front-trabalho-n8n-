<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoria de Segurança SSL/TLS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

.container{
    width:900px;
    margin:auto;
    margin-top:40px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:10px;
}

input{

    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:20px;

    border:2px solid #ccc;
    border-radius:6px;

    font-size:15px;

}

button{

    width:100%;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;

}

button:hover{

    background:#1d4ed8;

}

#loading{

    display:none;
    text-align:center;
    margin-top:20px;

}

#resultado{

    display:none;
    margin-top:30px;

}

.status{

    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;

}

.baixo{
    color:#22c55e;
}

.medio{
    color:#eab308;
}

.alto{
    color:#ef4444;
}

.critico{
    color:#dc2626;
}

.vulnerabilidade{

    background:#334155;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;

}

.vulnerabilidade h3{

    margin-bottom:10px;

}

</style>

</head>

<body>

<div class="container">

<h1>Auditoria Automática SSL/TLS</h1>

<div class="card">

<label>Endereço do Site</label>
<input
id="url"
placeholder="Dominio.com.br"
oninput="validarCampos()">

<label>Email</label>
<input
id="email"
placeholder="usuario@email.com"
oninput="validarCampos()">

<button
id="btnEnviar"
onclick="auditar()" disabled>
Iniciar Auditoria
</button>

<div id="loading">

<br>

Analisando servidor...

</div>

</div>

<div id="resultado">

<div class="card">

<div id="status" class="status"></div>

<p>
<b>Classificação de risco:</b>
<span id="risco"></span>
</p>

<br>

<h2>Vulnerabilidades</h2>

<div id="lista"></div>

</div>

</div>

</div>

<script>

function validarCampos(){

    const dominio = document.getElementById("url");
    const email = document.getElementById("email");

    const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const regexDominio = /^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}$/;

    const dominioValido = regexDominio.test(dominio.value.trim());
    const emailValido = regexEmail.test(email.value.trim());

    // Validação do domínio
    if(dominio.value.trim() == ""){
        dominio.style.border = "2px solid #ccc";
    }
    else if(dominioValido){
        dominio.style.border = "2px solid #22c55e";
    }
    else{
        dominio.style.border = "2px solid #ef4444";
    }

    // Validação do e-mail
    if(email.value.trim() == ""){
        email.style.border = "2px solid #ccc";
    }
    else if(emailValido){
        email.style.border = "2px solid #22c55e";
    }
    else{
        email.style.border = "2px solid #ef4444";
    }

    // Habilita ou desabilita o botão
    document.getElementById("btnEnviar").disabled =
        !(dominioValido && emailValido);

}

async function auditar(){

    document.getElementById("resultado").style.display="none";
    document.getElementById("loading").style.display="block";

    const url=document.getElementById("url").value;

    const email=document.getElementById("email").value;

    try{

        const response=await fetch("https://mercerproject.app.n8n.cloud/webhook/auditoria-ssl",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                url:url,
                email:email

            })

        });

        const dados=await response.json();

        document.getElementById("loading").style.display="none";
        document.getElementById("resultado").style.display="block";

        const status=document.getElementById("status");

        status.innerHTML="Status: "+dados.status;

        let classe="baixo";

        switch(dados.classificacao_risco.toLowerCase()){

            case "baixo":
                classe="baixo";
            break;

            case "médio":
            case "medio":
                classe="medio";
            break;

            case "alto":
                classe="alto";
            break;

            case "crítico":
            case "critico":
                classe="critico";
            break;

        }

        status.className="status "+classe;

        document.getElementById("risco").innerHTML=dados.classificacao_risco;

        const lista=document.getElementById("lista");

        lista.innerHTML="";

        dados.vulnerabilidades.forEach(v=>{

            lista.innerHTML+=`

            <div class="vulnerabilidade">

                <h3>${v.item}</h3>

                <p><b>Descrição:</b> ${v.descricao}</p>

                <br>

                <p><b>Recomendação:</b> ${v.recomendacao}</p>

            </div>

            `;

        });

    }

    catch(e){

        document.getElementById("loading").style.display="none";

        alert("Erro ao conectar com o servidor.");

        console.log(e);

    }

}

</script>

</body>
</html>
